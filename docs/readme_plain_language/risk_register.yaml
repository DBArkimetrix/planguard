risks:
  - id: DOC-PLAIN-001
    description: Simplifying the README could remove important workflow constraints.
    mitigation: keep the formal workflow sequence and required artifact list intact.
    category: documentation

  - id: DOC-PLAIN-002
    description: Plain-language wording could imply the tool makes decisions automatically without human review.
    mitigation: explicitly state that humans approve plans and only allow implementation after the checks pass.
    category: unintended_consequence
