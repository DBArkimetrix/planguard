plan:
  name: readme_post_activation_clarification
  status: completed
  created: '2026-03-23'
  owner: codex
  priority: medium
objective: Clarify in the README exactly what a developer should do after running
  planguard activate <plan_name>
scope:
  included:
  - README.md
  - docs
  - planguard
  excluded:
  - unrelated modules
phases:
- name: analysis
  tasks:
  - Analyze current implementation
  - Identify dependencies and risks
- name: implementation
  tasks:
  - Implement changes in safe, testable slices
- name: validation
  tasks:
  - Run tests and review for regressions
risks:
- id: RISK-001
  description: Regression impact on existing behaviour
  severity: medium
  mitigation: Add targeted regression tests before changing code
dependencies:
- id: analysis
  depends_on: []
- id: implementation
  depends_on:
  - analysis
- id: validation
  depends_on:
  - implementation
done_when:
- All tests pass
- No regressions in existing functionality
verify_commands:
- poetry run pytest tests/ -v
rollback_strategy: git revert to prior commit
test_strategy:
- area: Existing functionality in scope paths
  validation: Confirm no unintended behaviour changes
