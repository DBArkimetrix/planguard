sprints:
  - sprint: 1
    objective: unblock implementation with packaging and workflow analysis
    tasks:
      - finalize repair scope
      - register plan ownership and allowed paths
      - review collisions, regressions, and unintended consequences

  - sprint: 2
    objective: implement package and CLI fixes in testable slices
    tasks:
      - refactor script logic into importable package modules
      - connect CLI commands to those modules
      - update documentation and compatibility shims

  - sprint: 3
    objective: validate artifact completeness and handoff
    tasks:
      - rebuild and inspect wheel and sdist
      - rerun representative commands
      - update progress and handoff with residual risks
