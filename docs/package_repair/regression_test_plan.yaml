regression_tests:
  - area: CLI bootstrap
    validation: run `python -m agent_framework.cli --help` in the project virtual environment

  - area: plan generation and validation
    validation: run plan creation and validation commands against repository docs

  - area: distribution completeness
    validation: rebuild the wheel and sdist and verify required modules are present

  - area: backward-compatible script entrypoints
    validation: execute representative legacy scripts that now delegate into package modules
