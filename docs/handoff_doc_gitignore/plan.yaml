plan:
  name: handoff_doc_gitignore
  status: completed
  created: '2026-03-23'
  owner: codex
  priority: high
objective: Create a handoff document, ignore it in git, and update AGENTS.md to require
  handoff docs in .gitignore
scope:
  included:
  - .gitignore
  - AGENTS.md
  - docs
  excluded:
  - unrelated modules
phases:
- name: analysis
  tasks:
  - Analyze current implementation
  - Identify dependencies and risks
- name: implementation
  tasks:
  - Implement changes in safe, testable slices
- name: validation
  tasks:
  - Run tests and review for regressions
risks:
- id: RISK-001
  description: Regression impact on existing behaviour
  severity: medium
  mitigation: Add targeted regression tests before changing code
dependencies:
- id: analysis
  depends_on: []
- id: implementation
  depends_on:
  - analysis
- id: validation
  depends_on:
  - implementation
backlog:
- id: BL-001
  title: Analyze scope, architecture touchpoints, and test impact
  type: analysis
  phase: analysis
  scope:
  - .gitignore
  - AGENTS.md
  - docs
  depends_on: []
  deliverables:
  - Impacted modules and dependencies are identified
  - Required tests and rollback considerations are documented
  tests:
  - Identify the regression coverage that must be preserved before coding begins
  done_when: &id001
  - The implementation approach is clear
  - The test strategy covers the affected areas
- id: BL-002
  title: Implement changes in .gitignore
  type: implementation
  phase: implementation
  scope:
  - .gitignore
  depends_on:
  - BL-001
  deliverables:
  - Code changes in .gitignore are implemented in safe, reviewable slices
  tests:
  - Add or update focused regression tests covering .gitignore
  done_when:
  - The planned work for .gitignore is complete
- id: BL-003
  title: Document the change set for AGENTS.md
  type: documentation
  phase: implementation
  scope:
  - AGENTS.md
  depends_on:
  - BL-001
  deliverables:
  - Documentation in AGENTS.md explains the updated workflow or behaviour
  tests:
  - Review documentation accuracy for AGENTS.md against the implemented behaviour
  done_when:
  - The planned work for AGENTS.md is complete
- id: BL-004
  title: Document the change set for docs
  type: documentation
  phase: implementation
  scope:
  - docs
  depends_on:
  - BL-001
  deliverables:
  - Documentation in docs explains the updated workflow or behaviour
  tests:
  - Review documentation accuracy for docs against the implemented behaviour
  done_when:
  - The planned work for docs is complete
- id: BL-005
  title: Run verification, regression checks, and handoff review
  type: validation
  phase: validation
  scope:
  - .gitignore
  - AGENTS.md
  - docs
  depends_on:
  - BL-002
  - BL-003
  - BL-004
  deliverables:
  - Verification commands pass
  - Handoff notes capture any residual risk or follow-up work
  tests: &id003
  - poetry run pytest tests/ -v
  done_when: &id002
  - All tests pass
  - No regressions in existing functionality
sprints:
- id: SPRINT-01
  name: Discovery and test design
  goal: Confirm scope, architecture impact, and required regression coverage before
    implementation starts.
  backlog_items:
  - BL-001
  focus_paths:
  - .gitignore
  - AGENTS.md
  - docs
  exit_criteria: *id001
- id: SPRINT-02
  name: Implementation slice 1
  goal: Deliver a reviewable subset of the planned change set with matching test updates.
  backlog_items:
  - BL-002
  - BL-003
  focus_paths:
  - .gitignore
  - AGENTS.md
  exit_criteria:
  - The planned work for .gitignore is complete
  - The planned work for AGENTS.md is complete
- id: SPRINT-03
  name: Implementation slice 2
  goal: Deliver a reviewable subset of the planned change set with matching test updates.
  backlog_items:
  - BL-004
  focus_paths:
  - docs
  exit_criteria:
  - The planned work for docs is complete
- id: SPRINT-04
  name: Verification and handoff
  goal: Prove the change set works, document residual risk, and prepare completion.
  backlog_items:
  - BL-005
  focus_paths:
  - .gitignore
  - AGENTS.md
  - docs
  exit_criteria: *id002
done_when:
- All tests pass
- No regressions in existing functionality
verify_commands: *id003
rollback_strategy: git revert to prior commit
test_strategy:
- area: Existing functionality in scope paths
  validation: Confirm no unintended behaviour changes
