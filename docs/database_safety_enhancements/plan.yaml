  tests:
  - Add or update focused regression tests covering planguard/context/project_context.py
  done_when:
  - The planned work for planguard/context/project_context.py is complete
- id: BL-004
  title: Implement changes in planguard/safety/guard.py
  type: implementation
  phase: implementation
  scope:
  - planguard/safety/guard.py
  depends_on:
  - BL-001
  deliverables:
  - Code changes in planguard/safety/guard.py are implemented in safe, reviewable
