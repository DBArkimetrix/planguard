plan:
  name: database_safety_enhancements
  status: completed
  created: '2026-03-26'
  owner: unassigned
  priority: high
objective: Activate default database/migration policies, add migration boundaries,
  implement planguard guard command for staged-diff inspection, and update README
scope:
  included:
  - planguard/cli.py
  - planguard/context/project_context.py
  - planguard/safety/guard.py
  - tests/test_context.py
  - tests/test_cli.py
  - README.md
  - AGENTS.md
  excluded:
  - unrelated modules
phases:
- name: analysis
  tasks:
  - Analyze current implementation
  - Identify dependencies and risks
- name: implementation
  tasks:
  - Implement changes in safe, testable slices
- name: validation
  tasks:
  - Run tests and review for regressions
risks:
- id: RISK-001
  description: Regression impact on existing behaviour
  severity: medium
  mitigation: Add targeted regression tests before changing code
dependencies:
- id: analysis
  depends_on: []
- id: implementation
  depends_on:
  - analysis
- id: validation
  depends_on:
  - implementation
backlog:
- id: BL-001
  title: Analyze scope, architecture touchpoints, and test impact
  type: analysis
  phase: analysis
  scope:
  - planguard/cli.py
  - planguard/context/project_context.py
  - planguard/safety/guard.py
  - tests/test_context.py
  - tests/test_cli.py
  - README.md
  - AGENTS.md
  depends_on: []
  deliverables:
  - Impacted modules and dependencies are identified
  - Required tests and rollback considerations are documented
  tests:
  - Identify the regression coverage that must be preserved before coding begins
  done_when: &id001
  - The implementation approach is clear
  - The test strategy covers the affected areas
- id: BL-002
  title: Implement changes in planguard/cli.py
  type: implementation
  phase: implementation
  scope:
  - planguard/cli.py
  depends_on:
  - BL-001
  deliverables:
  - Code changes in planguard/cli.py are implemented in safe, reviewable slices
  tests:
  - Add or update focused regression tests covering planguard/cli.py
  done_when:
  - The planned work for planguard/cli.py is complete
- id: BL-003
  title: Implement changes in planguard/context/project_context.py
  type: implementation
  phase: implementation
  scope:
  - planguard/context/project_context.py
  depends_on:
  - BL-001
  deliverables:
  - Code changes in planguard/context/project_context.py are implemented in safe,
