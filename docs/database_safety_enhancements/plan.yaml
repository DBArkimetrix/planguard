- id: SPRINT-06
  name: Verification and handoff
  goal: Prove the change set works, document residual risk, and prepare completion.
  backlog_items:
  - BL-009
  focus_paths:
  - AGENTS.md
  - README.md
  - planguard/cli.py
  - planguard/context/project_context.py
  - planguard/safety/guard.py
  - tests/test_cli.py
  - tests/test_context.py
