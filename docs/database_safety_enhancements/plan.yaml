  tests:
  - Add or update focused regression tests covering planguard/safety/guard.py
  done_when:
  - The planned work for planguard/safety/guard.py is complete
- id: BL-005
  title: Update automated coverage for tests/test_context.py
  type: testing
  phase: implementation
  scope:
  - tests/test_context.py
  depends_on:
  - BL-001
  deliverables:
  - Targeted tests in tests/test_context.py reflect the new behaviour
  tests:
  - Run the tests in or affected by tests/test_context.py
  done_when:
  - The planned work for tests/test_context.py is complete
- id: BL-006
  title: Update automated coverage for tests/test_cli.py
  type: testing
  phase: implementation
  scope:
  - tests/test_cli.py
  depends_on:
  - BL-001
  deliverables:
  - Targeted tests in tests/test_cli.py reflect the new behaviour
  tests:
  - Run the tests in or affected by tests/test_cli.py
  done_when:
  - The planned work for tests/test_cli.py is complete
- id: BL-007
  title: Document the change set for README.md
  type: documentation
  phase: implementation
  scope:
  - README.md
  depends_on:
  - BL-001
  deliverables:
  - Documentation in README.md explains the updated workflow or behaviour
  tests:
  - Review documentation accuracy for README.md against the implemented behaviour
  done_when:
  - The planned work for README.md is complete
- id: BL-008
  title: Document the change set for AGENTS.md
  type: documentation
  phase: implementation
  scope:
  - AGENTS.md
  depends_on:
  - BL-001
  deliverables:
  - Documentation in AGENTS.md explains the updated workflow or behaviour
  tests:
  - Review documentation accuracy for AGENTS.md against the implemented behaviour
