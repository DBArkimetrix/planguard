  name: Discovery and test design
  goal: Confirm scope, architecture impact, and required regression coverage before
    implementation starts.
  backlog_items:
  - BL-001
  focus_paths:
  - AGENTS.md
  - README.md
  - planguard/cli.py
  - planguard/context/project_context.py
  - planguard/safety/guard.py
  - tests/test_cli.py
  - tests/test_context.py
  exit_criteria: *id001
- id: SPRINT-02
  name: Implementation slice 1
  goal: Deliver a reviewable subset of the planned change set with matching test updates.
  backlog_items:
  - BL-002
  - BL-003
  focus_paths:
  - planguard/cli.py
  - planguard/context/project_context.py
  exit_criteria:
  - The planned work for planguard/cli.py is complete
  - The planned work for planguard/context/project_context.py is complete
- id: SPRINT-03
  name: Implementation slice 2
  goal: Deliver a reviewable subset of the planned change set with matching test updates.
  backlog_items:
  - BL-004
  - BL-005
  focus_paths:
  - planguard/safety/guard.py
  - tests/test_context.py
  exit_criteria:
  - The planned work for planguard/safety/guard.py is complete
  - The planned work for tests/test_context.py is complete
- id: SPRINT-04
  name: Implementation slice 3
  goal: Deliver a reviewable subset of the planned change set with matching test updates.
  backlog_items:
  - BL-006
  - BL-007
  focus_paths:
  - README.md
  - tests/test_cli.py
  exit_criteria:
  - The planned work for tests/test_cli.py is complete
