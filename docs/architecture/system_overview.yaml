system:
  name: planguard
  description: framework for safe multi-agent software delivery

components:
  - name: planning
    responsibility: turns scope and objectives into plans with phases, backlog items, sprint slices, and test expectations
  - name: safety
    responsibility: risk scoring, scope enforcement, and policy/boundary gating
  - name: orchestration
    responsibility: dependency and collision management across plans and execution slices
  - name: validation
    responsibility: structure validation and verification workflow state
