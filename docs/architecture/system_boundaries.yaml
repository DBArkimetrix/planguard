systems:

  planning:
    paths:
      - planguard/planning
      - docs/planning
      - docs/architecture

    downstream:
      - orchestration
      - validation

  safety:
    paths:
      - planguard/safety
      - .planguard

    downstream:
      - orchestration
      - validation

  orchestration:
    paths:
      - planguard/orchestration

    downstream:
      - validation

  validation:
    paths:
      - planguard/validation
      - tests

  context:
    paths:
      - planguard/context
