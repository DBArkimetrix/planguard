data_models:

  plan:
    fields:
      - plan.name
      - plan.status
      - plan.created
      - plan.owner
      - plan.priority
      - objective
      - scope
      - phases
      - backlog
      - sprints
      - risks
      - dependencies
      - done_when
      - verify_commands
      - rollback_strategy
      - test_strategy

  backlog_item:
    fields:
      - id
      - title
      - type
      - phase
      - scope
      - depends_on
      - deliverables
      - tests
      - done_when

  sprint:
    fields:
      - id
      - name
      - goal
      - backlog_items
      - focus_paths
      - exit_criteria

  status:
    fields:
      - status.phase
      - status.progress_percent
      - activation
      - verification
      - completed_steps
      - remaining_steps
      - blockers
      - handoff
