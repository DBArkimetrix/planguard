phases:
  - phase: analysis
    tasks:
      - review the existing README workflow wording for gaps after `agent init` and `agent plan`
      - determine where the README should explain the difference between scaffolding and enforcement
      - review integration implications for cloning the framework into another repository

  - phase: implementation
    tasks:
      - add a step-by-step workflow section showing the next commands and human review steps
      - document where `AGENTS.md` should live when the framework is used inside another repository
      - align the README wording with the repository's documentation-first process

  - phase: validation
    tasks:
      - verify the README guidance is consistent with the current CLI behavior
      - validate the plan structure after documentation updates
      - review for collisions or contradictions with planning registry guidance
