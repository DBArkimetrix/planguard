risks:
  - id: RISK-001
    description: README wording could overstate enforcement and imply the CLI blocks implementation automatically
    mitigation: state clearly that planning artifacts are scaffolded by the CLI and enforced operationally by agent instructions and review

  - id: RISK-002
    description: Existing-project guidance could be ambiguous about where `AGENTS.md` belongs
    mitigation: document that the repository root used by the agent should contain the authoritative `AGENTS.md`

  - id: RISK-003
    description: Documentation edits could conflict with planning registry conventions
    mitigation: register the plan in planning metadata and keep changes within declared allowed paths
