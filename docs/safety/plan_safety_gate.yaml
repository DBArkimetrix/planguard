safety_gate_rules:
  regression_risk:
    weight: 3
  dependency_surface:
    weight: 2
  architecture_boundary_crossed:
    weight: 3
  data_integrity_risk:
    weight: 3
  test_coverage_gap:
    weight: 2
  security_risk:
    weight: 3
  unintended_consequence_risk:
    weight: 2

approval_threshold:
  max_score_allowed: 6
  requires_mitigation_if_above_threshold: true
