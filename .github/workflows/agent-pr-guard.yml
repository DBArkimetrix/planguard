name: Agent PR Guard

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install pyyaml

      - name: Validate plan structure
        run: python scripts/validate_plan.py docs/example_plan

      - name: Compute safety score
        run: python scripts/compute_risk_score.py

      - name: Check PR file changes
        run: python scripts/check_pr_changes.py