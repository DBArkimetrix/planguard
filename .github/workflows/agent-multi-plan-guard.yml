name: Agent Multi Plan Guard

on:
  pull_request:

jobs:
  guard:
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install pyyaml

      - run: python scripts/detect_collisions.py
      - run: python scripts/build_execution_schedule.py
      - run: python scripts/check_pr_changes.py