name: Agent Multi Plan Guard

on:
  pull_request:
  push:
    branches: [ main ]

jobs:

  guard:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate plans
        run: python scripts/validate_plan.py docs

      - name: Compute risk score
        run: python scripts/compute_risk_score.py

      - name: Detect collisions
        run: python scripts/detect_collisions.py

      - name: Build execution schedule
        run: python scripts/build_execution_schedule.py

      - name: Analyze change impact
        run: python scripts/analyze_change_impact.py

      - name: Generate architecture diagram
        run: python scripts/generate_architecture_diagram.py